backend:
  name: github
  repo: bartram-studio/bartramstudio-website
  branch: main
  base_url: https://bartram-studio-oauth.netlify.app
  auth_endpoint: auth

media_folder: "public/images/products"
public_folder: "/images/products"

site_url: https://bartramstudio.com
display_url: https://bartramstudio.com

collections:
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "src/content/products"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    sortable_fields: ["title", "price", "status", "category"]
    view_filters:
      - label: "Available"
        field: status
        pattern: "available"
      - label: "Pending"
        field: status
        pattern: "pending"
      - label: "Sold"
        field: status
        pattern: "sold"
      - label: "Featured"
        field: featured
        pattern: true
    view_groups:
      - label: "By Category"
        field: category
      - label: "By Status"
        field: status
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "The name of the piece as it appears on the site."

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Resin Art"
          - "Coastal Decor"
          - "Seasonal Crafts"
          - "Custom Pieces"

      - label: "Description"
        name: "description"
        widget: "text"
        hint: "A detailed description of the piece — materials, size, what makes it special."

      - label: "Price (USD)"
        name: "price"
        widget: "number"
        min: 1
        value_type: "int"
        hint: "Enter the price in whole dollars. Example: 85 means $85."

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Available — ready to purchase", value: "available" }
          - { label: "Pending — sale in progress", value: "pending" }
          - { label: "Sold — no longer available", value: "sold" }
        default: "available"

      - label: "Quantity Available"
        name: "quantity"
        widget: "number"
        min: 0
        default: 1
        value_type: "int"
        hint: "How many are available. Use 1 for one-of-a-kind pieces."

      - label: "Featured on Homepage"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Turn on to show this piece in the Featured section on the homepage."

      - label: "Custom Order Available"
        name: "customOrderAvailable"
        widget: "boolean"
        default: false
        hint: "Turn on if you can make a similar piece to order."

      - label: "Photos"
        name: "images"
        widget: "list"
        min: 0
        max: 8
        allow_add: true
        collapsed: false
        label_singular: "Photo"
        hint: "Upload photos. The first photo is the thumbnail. Aim for at least 800x600px."
        field:
          label: "Photo"
          name: "image"
          widget: "image"

  - name: "site"
    label: "Site Content"
    label_singular: "Page"
    description: "Edit the wording on the Home, About, and Contact pages."
    files:

      - name: "home"
        label: "Homepage"
        file: "src/content/site/home.md"
        fields:
          - { label: "Hero — Eyebrow", name: "heroEyebrow", widget: "string", hint: "Small uppercase label above the main headline." }
          - { label: "Hero — Title", name: "heroTitle", widget: "string", hint: "First line of the main headline." }
          - { label: "Hero — Title Emphasis", name: "heroTitleEmphasis", widget: "string", hint: "Second line of the headline, shown in italic teal." }
          - { label: "Hero — Lead Text", name: "heroLead", widget: "text", hint: "Paragraph below the headline." }
          - { label: "Featured — Eyebrow", name: "featuredEyebrow", widget: "string" }
          - { label: "Featured — Title", name: "featuredTitle", widget: "string" }
          - { label: "Featured — Subtitle", name: "featuredText", widget: "string" }
          - { label: "Categories — Eyebrow", name: "categoriesEyebrow", widget: "string" }
          - { label: "Categories — Title", name: "categoriesTitle", widget: "string" }
          - { label: "About Strip — Eyebrow", name: "aboutEyebrow", widget: "string" }
          - { label: "About Strip — Title", name: "aboutTitle", widget: "string" }
          - { label: "About Strip — Text", name: "aboutText", widget: "text" }
          - { label: "CTA — Title", name: "ctaTitle", widget: "string", hint: "First line, plain text." }
          - { label: "CTA — Title Emphasis", name: "ctaTitleEmphasis", widget: "string", hint: "Second line, shown in italic coral." }
          - { label: "CTA — Body Text", name: "ctaText", widget: "text" }
          - { label: "CTA — Button Text", name: "ctaButtonText", widget: "string" }

      - name: "about"
        label: "About Page"
        file: "src/content/site/about.md"
        fields:
          - { label: "Page Hero — Eyebrow", name: "pageEyebrow", widget: "string" }
          - { label: "Page Hero — Title", name: "pageTitle", widget: "string" }
          - { label: "Page Hero — Intro", name: "pageIntro", widget: "string" }
          - { label: "Intro Section — Eyebrow", name: "introEyebrow", widget: "string" }
          - { label: "Intro Section — Title", name: "introTitle", widget: "string" }
          - label: "Intro Section — Paragraphs"
            name: "introParagraphs"
            widget: "list"
            allow_add: true
            label_singular: "Paragraph"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Craft Section — Eyebrow", name: "craftEyebrow", widget: "string" }
          - { label: "Craft Section — Title", name: "craftTitle", widget: "string" }
          - { label: "Craft Section — Subtitle", name: "craftText", widget: "string" }
          - label: "Process Steps"
            name: "processSteps"
            widget: "list"
            allow_add: true
            label_singular: "Step"
            fields:
              - { label: "Step Title", name: "title", widget: "string" }
              - { label: "Step Description", name: "body", widget: "text" }
          - { label: "Values — Eyebrow", name: "valuesEyebrow", widget: "string" }
          - { label: "Values — Title", name: "valuesTitle", widget: "string" }
          - label: "Values — Paragraphs"
            name: "valuesParagraphs"
            widget: "list"
            allow_add: true
            label_singular: "Paragraph"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Quote — Text", name: "quoteText", widget: "text", hint: "Do not include quotation marks — they are added automatically." }
          - { label: "Quote — Citation", name: "quoteCitation", widget: "string" }
          - { label: "Contact CTA — Title", name: "contactCtaTitle", widget: "string" }
          - { label: "Contact CTA — Body Text", name: "contactCtaText", widget: "text" }
          - { label: "Contact CTA — Button Text", name: "contactCtaButtonText", widget: "string" }

      - name: "contact"
        label: "Contact Page"
        file: "src/content/site/contact.md"
        fields:
          - { label: "Page Hero — Eyebrow", name: "pageEyebrow", widget: "string" }
          - { label: "Page Hero — Title", name: "pageTitle", widget: "string" }
          - { label: "Page Hero — Intro", name: "pageIntro", widget: "string" }
          - { label: "Form — Title", name: "formTitle", widget: "string" }
          - { label: "Form — Intro", name: "formIntro", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string", hint: "Shown as a clickable mailto link in the sidebar." }
          - { label: "Instagram Handle", name: "instagramHandle", widget: "string", hint: "Include the @ symbol, e.g. @bartramstudio" }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Custom Orders — Title", name: "customOrdersTitle", widget: "string" }
          - label: "Custom Orders — Paragraphs"
            name: "customOrdersParagraphs"
            widget: "list"
            allow_add: true
            label_singular: "Paragraph"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Response Time", name: "responseTime", widget: "string", hint: "e.g. 1–2 business days" }
          - label: "FAQ Items"
            name: "faqItems"
            widget: "list"
            allow_add: true
            label_singular: "FAQ"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
